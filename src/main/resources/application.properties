micronaut.application.name=micronautguide
jackson.serialization-inclusion=ALWAYS

micronaut.application.name=micronautguide

# DataSource config
datasources.default.url=jdbc:postgresql://localhost:5432/your_db_name
datasources.default.username=your_username
datasources.default.password=your_password
datasources.default.driver-class-name=org.postgresql.Driver

# JPA / Hibernate config
jpa.default.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
jpa.default.properties.hibernate.hbm2ddl.auto=update

# Optional Jackson config
jackson.serialization-inclusion=ALWAYS
