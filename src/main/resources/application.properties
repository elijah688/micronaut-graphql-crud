#Wed Jun 11 11:48:00 BST 2025
micronaut.application.name=micronautguide
jackson.serialization-inclusion=ALWAYS

micronaut.application.name=micronautguide

# DataSource config
datasources.default.url=jdbc:postgresql://localhost:6969/postgres
datasources.default.username=postgres
datasources.default.password=pass
datasources.default.driver-class-name=org.postgresql.Driver

# JPA / Hibernate config
jpa.default.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
jpa.default.properties.hibernate.hbm2ddl.auto=update

# Optional Jackson config
jackson.serialization-inclusion=ALWAYS


# Enable Micronaut security
micronaut.security.enabled=true

# JWT configuration
micronaut.security.token.jwt.enabled=true
micronaut.security.token.jwt.signatures.secret.generator.secret=verysecretkey12345

# Secure the GraphQL endpoint to require authentication for POST requests
micronaut.security.intercept-url-map[0].pattern=/graphql
micronaut.security.intercept-url-map[0].methods=POST
micronaut.security.intercept-url-map[0].access.roles=ROLE_USER

# Optional: allow anonymous access for OPTIONS (CORS preflight)
micronaut.security.intercept-url-map[1].pattern=/**
micronaut.security.intercept-url-map[1].methods=OPTIONS
micronaut.security.intercept-url-map[1].access=permitAll

# Specify the login endpoint if you use Micronaut's authentication endpoints
micronaut.security.endpoints.login.enabled=true
